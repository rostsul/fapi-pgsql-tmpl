services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [backend]
    deploy:
      resources:
        limits: { cpus: '1', memory: 512M }

networks: { backend: { driver: bridge } }

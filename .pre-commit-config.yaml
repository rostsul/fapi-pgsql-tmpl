# .pre-commit-config.yaml
repos:
  # 🧹 Базовые проверки файлов
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ['--allow-multiple-documents'] # Для k8s/manifests с ---
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # 🐍 Ruff: линтер + форматтер
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # 🔒 OWASP: поиск захардкоженных секретов
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  # 📦 Проверка актуальности lock-файла (uv/ty)
  - repo: local
    hooks:
      - id: uv-lock-check
        name: Check uv.lock consistency
        entry: uv lock --check
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$
        types: [toml]

  # 🛡️ Статический анализ безопасности (опционально, но рекомендуется)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "--skip", "B101"] # B101 = assert used (OK для тестов)
        additional_dependencies: ["bandit[toml]"]
